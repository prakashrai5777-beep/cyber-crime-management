<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    overflow-x:hidden;
    color:white;
    position:relative; /* 🔥 important fix */
}

/* Background blobs */
body::before, body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
}

body::before{
    background:#00ffff;
    top:10%;
    left:10%;
    animation: moveBlob 10s infinite alternate;
}

body::after{
    background:#ff00ff;
    bottom:10%;
    right:10%;
    animation: moveBlob 12s infinite alternate;
}

@keyframes moveBlob{
    from{transform:translate(0,0);}
    to{transform:translate(80px,60px);}
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

nav h1{
    font-size:22px;
    background: linear-gradient(90deg,#00ffff,#ff00ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color: transparent; /* 🔥 fix for compatibility */
    animation: float 3s ease-in-out infinite;
}

nav ul{
    display:flex;
    gap:25px;
    list-style:none;
}

nav a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

nav a:hover{
    color:#00ffff;
}

/* Hero */
.hero{
    height:85vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* Bouncy text */
.bounce span{
    font-size:60px;
    font-weight:bold;
    display:inline-block;
    background: linear-gradient(90deg,#00ffff,#ff00ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color: transparent; /* 🔥 fix */
    animation: bounce 1.2s infinite;
}

.bounce span{
    animation-delay: calc(0.08s * var(--i));
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-18px);}
}

/* Subtitle */
.hero p{
    margin-top:20px;
    font-size:18px;
    opacity:0.9;
    animation: fadeUp 1.5s ease;
}

/* Button */
.btn{
    margin-top:20px;
    padding:12px 30px;
    border-radius:30px;
    background:linear-gradient(90deg,#00ffff,#ff00ff);
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00ffff;
}

/* Cards */
.features{
    display:flex;
    justify-content:center;
    gap:30px;
    padding:40px;
    flex-wrap:wrap;
}

.card{
    width:260px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
    transition:0.4s;
    text-decoration:none;
    color:white;
}

.card:hover{
    transform:translateY(-15px) scale(1.05);
    box-shadow:0 0 25px rgba(0,255,255,0.5);
}

.card h3{
    margin-bottom:10px;
}

/* Footer */
footer{
    text-align:center;
    padding:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

/* Animations */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}
</style>
</head>

        <span style="--i:4">E</span>
