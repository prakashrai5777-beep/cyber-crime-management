<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - CyberSafe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0a0f1c,#111827,#1f2937);
    overflow:hidden;
    color:white;
    position:relative;
}

/* Soft background glow */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#00ffff33,#ff00ff22);
    filter:blur(120px);
    animation: move 10s infinite alternate;
    z-index:-1;
}

@keyframes move{
    from{transform:translate(-100px,-50px);}
    to{transform:translate(100px,50px);}
}

/* Back Button */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    padding:10px 20px;
    border-radius:25px;
    border:1px solid #00ffff;
    color:#00ffff;
    text-decoration:none;
    transition:0.3s;
}

.back-btn:hover{
    background:#00ffff;
    color:black;
    box-shadow:0 0 15px #00ffff;
}

/* Register Box */
.register-box{
    width:380px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.12); /* FIXED VISIBILITY */
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 30px rgba(0,255,255,0.25);
    text-align:center;
    animation: pop 0.8s ease;
}

/* Bouncy Heading */
.register-box h2{
    margin-bottom:20px;
}

.register-box h2 span{
    display:inline-block;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff;
    animation: bounce 1s infinite;
}

.register-box h2 span{
    animation-delay: calc(0.1s * var(--i));
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* Inputs */
.input-box{
    margin:12px 0;
}

.input-box input{
    width:100%;
    padding:12px;
    border-radius:25px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.2); /* FIXED */
    color:white;
    font-weight:500;
    transition:0.3s;
}

.input-box input::placeholder{
    color:#e5e7eb;
}

.input-box input:focus{
    box-shadow:0 0 10px #00ffff;
    transform:scale(1.03);
}

/* Button */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(90deg,#00ffff,#ff00ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00ffff;
}

/* Link */
.link{
    display:block;
    margin-top:12px;
    font-size:14px;
    color:#d1d5db;
    text-decoration:none;
}

.link:hover{
    color:#00ffff;
}

/* Animation */
@keyframes pop{
    from{transform:scale(0.5); opacity:0;}
    to{transform:scale(1); opacity:1;}
}</style>
</head>

<body>

<!-- 🔙 Back to Home -->
<a href="index.html" class="back-btn">⬅ Back to Home</a>

<div class="register-box">
    <h2>📝 Register</h2>

    <form action="register.php" method="POST">
        <div class="input-box">
            <input type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="input-box">
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        </div>

        <button type="submit"class="btn" name="register">create account</button>

        <a href="login.html" class="link">Already have an account? Login</a>
    </form>
</div>

</body>
</html>
